name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  HOST_NODE_VERSION: "22"
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14
            arch: arm64
          - os: macos-14
            arch: x64
          - os: windows-2022
            arch: x64
          - os: windows-2022
            arch: ia32
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.HOST_NODE_VERSION }}

      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxinerama-dev libxtst-dev xvfb

      - if: runner.os == 'macOS' && matrix.arch == 'x64'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Grant macOS accessibility & memory permissions
        if: runner.os == 'macOS'
        run: |
          # Try to add node binary to TCC accessibility database
          # (works if the image was built with SIP off; harmless if SIP blocks it)
          NODE_BIN=$(which node)
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "INSERT OR REPLACE INTO access VALUES('kTCCServiceAccessibility','$NODE_BIN',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s),NULL,NULL,'UNUSED',$(date +%s));" 2>/dev/null || true
          # Also try for the cross-compiled x64 node if applicable
          if [ "${{ matrix.arch }}" = "x64" ] && [ "${{ runner.arch }}" != "X64" ]; then
            NODE_VERSION=$(node -v)
            X64_NODE="$(pwd)/node-${NODE_VERSION}-darwin-x64/bin/node"
            # Will be granted later after download, see test step
          fi
          # Diagnostic: check what's already granted
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "SELECT client FROM access WHERE service='kTCCServiceAccessibility';" 2>/dev/null || echo "(TCC.db read blocked by SIP)"

      - name: Diagnose Windows desktop session
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Session ID: $([System.Diagnostics.Process]::GetCurrentProcess().SessionId)"
          query session 2>$null || Write-Host "(query session not available)"
          query user 2>$null || Write-Host "(query user not available)"
          # Check if we have an interactive desktop
          Add-Type -TypeDefinition @"
          using System;
          using System.Runtime.InteropServices;
          public class Desktop {
              [DllImport("user32.dll")]
              public static extern IntPtr GetDesktopWindow();
              [DllImport("user32.dll")]
              public static extern IntPtr GetForegroundWindow();
          }
          "@
          $desktop = [Desktop]::GetDesktopWindow()
          $foreground = [Desktop]::GetForegroundWindow()
          Write-Host "Desktop window handle: $desktop"
          Write-Host "Foreground window handle: $foreground"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: npm ci --ignore-scripts

      - run: npm run build -- --target=$(node -v | sed 's/^v//') --arch ${{ matrix.arch }}

      - name: Bundle TypeScript
        run: bun build lib/index.ts --outdir dist --target node --format cjs --external node-gyp-build --external path

      - name: Run tests
        run: |
          if [ "${{ matrix.arch }}" = "x64" ] && [ "${{ runner.arch }}" != "X64" ]; then
            # Cross-compiled x64 on arm64 macOS — download x64 node to test
            NODE_VERSION=$(node -v)
            curl -sL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-darwin-x64.tar.gz" | tar xz
            X64_NODE="./node-${NODE_VERSION}-darwin-x64/bin/node"
            # Grant accessibility to the x64 node binary too
            sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
              "INSERT OR REPLACE INTO access VALUES('kTCCServiceAccessibility','$(cd "$(dirname "$X64_NODE")" && pwd)/$(basename "$X64_NODE")',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s),NULL,NULL,'UNUSED',$(date +%s));" 2>/dev/null || true
            # Run with sudo to enable task_for_pid for memory tests
            sudo $X64_NODE test/test-ci.js all
          elif [ "${{ matrix.arch }}" = "ia32" ]; then
            NODE_VERSION=$(node -v)
            curl -sLO "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-win-x86.zip"
            unzip -q "node-${NODE_VERSION}-win-x86.zip"
            ./node-${NODE_VERSION}-win-x86/node test/test-ci.js all
          elif [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run --auto-servernum node test/test-ci.js all
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # Run with sudo to enable task_for_pid for memory tests
            # and potentially bypass TCC for CGEventPost
            sudo node test/test-ci.js all
          else
            node test/test-ci.js all
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/
          if-no-files-found: error
