name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    uses: ./.github/workflows/build-reusable.yml

  test-summary:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          path: results

      - name: Build comment body
        run: |
          cat <<'SCRIPT' > summary.js
          const fs = require("fs"), path = require("path");
          const resultsDir = "results";

          let comment = "";
          let allPassed = true;
          let anyResults = false;

          // Aggregate per-line hit counts across all cells.  Each line is
          // counted as covered in the combined view if any cell covered it,
          // so cross-platform files (e.g. lib/ffi/clipboard.ts) get credit
          // for both their Linux and Windows halves.
          const combined = {}; // sf -> { ln -> hits }

          const dirs = fs.readdirSync(resultsDir).filter(d =>
            d.startsWith("test-results-") && fs.statSync(path.join(resultsDir, d)).isDirectory()
          ).sort();

          for (const dir of dirs) {
            const platform = dir.replace("test-results-", "").replace(/-(?=[^-]*$)/, " / ");
            const junitDir = path.join(resultsDir, dir, "junit");
            const covDir = path.join(resultsDir, dir, "coverage");

            // Parse JUnit
            let pass = 0, fail = 0, skip = 0;
            const rows = [];
            try {
              const xmlFiles = fs.readdirSync(junitDir).filter(f => f.endsWith(".xml"));
              for (const xf of xmlFiles) {
                const xml = fs.readFileSync(path.join(junitDir, xf), "utf8");
                // Match testcase as either self-closing or with body. Body
                // capture must be non-greedy AND blocked from spanning into
                // the next <testcase ...> opening tag (otherwise a self-
                // closing testcase's body would extend up to the next
                // </testcase>, dragging in failure/skipped markers from
                // unrelated tests).
                const re = /<testcase\s+([^>]*?)\s*(?:\/>|>((?:(?!<testcase\b)[\s\S])*?)<\/testcase>)/g;
                let m;
                while ((m = re.exec(xml)) !== null) {
                  const attrs = m[1], body = m[2] || "";
                  const nameMatch = attrs.match(/name="([^"]*)"/);
                  const timeMatch = attrs.match(/time="([^"]*)"/);
                  const name = nameMatch ? nameMatch[1] : "?";
                  const time = timeMatch ? timeMatch[1] : "0";
                  const skipped = body.includes("<skipped");
                  const failed = body.includes("<failure");
                  if (failed) { fail++; allPassed = false; }
                  else if (skipped) { skip++; }
                  else { pass++; }
                  const icon = failed ? ":x:" : skipped ? ":fast_forward:" : ":white_check_mark:";
                  rows.push(`| ${name} | ${icon} | ${time}s |`);
                }
              }
            } catch (_) {}

            // Parse coverage percentage
            let covPct = "";
            try {
              const lcov = fs.readFileSync(path.join(covDir, "lcov.info"), "utf8");
              let hit = 0, total = 0;
              for (const line of lcov.split("\n")) {
                if (line.startsWith("DA:")) { total++; if (!line.endsWith(",0")) hit++; }
              }
              if (total > 0) covPct = (100 * hit / total).toFixed(1) + "%";
            } catch (_) {}

            const total = pass + fail + skip;
            if (total === 0) continue;
            anyResults = true;

            const status = fail > 0 ? ":x:" : ":white_check_mark:";
            const covStr = covPct ? ` · ${covPct} coverage` : "";
            const skipStr = skip > 0 ? `, ${skip} skipped` : "";
            const failStr = fail > 0 ? `, ${fail} failed` : "";
            comment += `<details>\n`;
            comment += `<summary>${status} <b>${platform}</b> — ${pass}/${total} passed${failStr}${skipStr}${covStr}</summary>\n\n`;
            // Only list failed/skipped tests to keep the comment within
            // GitHub's 65536-char limit.  Passing tests are just counted.
            const notable = rows.filter(r => !r.includes(":white_check_mark:"));
            if (notable.length > 0) {
              comment += `| Test | Status | Time |\n|------|--------|------|\n`;
              comment += notable.join("\n") + "\n";
            } else {
              comment += `All ${pass} tests passed.\n`;
            }

            // Per-file coverage table; also feed into the combined aggregate.
            if (covPct) {
              try {
                const lcov = fs.readFileSync(path.join(covDir, "lcov.info"), "utf8");
                let cur = null, curNorm = null;
                for (const line of lcov.split("\n")) {
                  if (line.startsWith("SF:")) {
                    curNorm = line.slice(3).replace(/^.*[\/\\]lib[\/\\]/, "lib/").replace(/\\/g, "/");
                    cur = curNorm;
                    if (!combined[curNorm]) combined[curNorm] = { lines: {}, parsers: new Set() };
                    combined[curNorm].parsers.add(platform);
                  } else if (line.startsWith("DA:") && cur) {
                    const [ln, hits] = line.slice(3).split(",").map(Number);
                    const rec = combined[curNorm].lines[ln]
                      || (combined[curNorm].lines[ln] = { hits: 0, emitters: new Set() });
                    rec.hits += (hits || 0);
                    rec.emitters.add(platform);
                  } else if (line === "end_of_record") {
                    cur = null; curNorm = null;
                  }
                }
              } catch (_) {}
            }

            comment += `\n</details>\n\n`;
          }

          // ── Combined "all platforms" coverage view ────────────────────
          // Union the per-line hits from every cell so a line counts as
          // covered if any platform exercised it.  This gives a single
          // headline number that isn't dragged down by opposite-OS code
          // in cross-platform files.
          const combinedFiles = Object.entries(combined).filter(([, v]) => Object.keys(v.lines).length > 0);
          if (anyResults && combinedFiles.length > 0) {
            let tH = 0, tL = 0;
            const rows = [];
            for (const [f, { lines, parsers }] of combinedFiles.sort()) {
              let hit = 0, total = 0;
              for (const lnStr of Object.keys(lines)) {
                const { hits, emitters } = lines[lnStr];
                // Drop phantom-uncovered lines: zero hits everywhere AND at
                // least one platform that parsed this file didn't emit a DA
                // for this line.  Bun sometimes emits DA:line,0 for comment/
                // whitespace lines inside functions that weren't called, but
                // skips the same lines entirely on platforms where the
                // function actually ran — so a naive union under-reports.
                if (hits === 0 && emitters.size < parsers.size) continue;
                total++;
                if (hits > 0) hit++;
              }
              if (total === 0) continue;
              rows.push(`| ${f} | ${hit}/${total} | ${(100*hit/total).toFixed(1)}% |`);
              tH += hit; tL += total;
            }
            const pct = tL > 0 ? (100*tH/tL).toFixed(1) : "0";
            comment += `<details>\n`;
            comment += `<summary>:bar_chart: <b>All platforms (combined)</b> — ${pct}% coverage (${tH}/${tL} lines hit on at least one platform)</summary>\n\n`;
            comment += `| File | Lines | Coverage |\n|------|------:|----------|\n`;
            comment += rows.join("\n") + "\n";
            comment += `| **Total** | **${tH}/${tL}** | **${pct}%** |\n`;
            comment += `\n</details>\n\n`;
          }

          if (!anyResults) {
            comment += "_No test results found in artifacts._\n";
          }

          // ── Matrix cross-check: every "ok" cell must be exercised ───
          const exFiles = [];
          for (const dir of dirs) {
            const exDir = path.join(resultsDir, dir, "exercised");
            try {
              for (const f of fs.readdirSync(exDir).filter(f => f.endsWith(".json"))) {
                try { exFiles.push(JSON.parse(fs.readFileSync(path.join(exDir, f), "utf8"))); }
                catch (_) {}
              }
            } catch (_) {}
          }
          if (exFiles.length > 0) {
            const allOk = {};  // column -> Set<fn>
            const allEx = {};  // column -> Set<fn>
            for (const ef of exFiles) {
              const col = ef.platform + "-" + ef.backend;
              if (!allOk[col]) allOk[col] = new Set();
              if (!allEx[col]) allEx[col] = new Set();
              for (const fn of ef.okCells || []) allOk[col].add(fn);
              for (const fn of ef.exercised || []) allEx[col].add(fn);
            }
            const gaps = [];
            for (const [col, okSet] of Object.entries(allOk)) {
              const exSet = allEx[col] || new Set();
              for (const fn of okSet) {
                if (!exSet.has(fn)) gaps.push({ col, fn });
              }
            }
            if (gaps.length > 0) {
              allPassed = false;
              comment += `<details>\n<summary>:warning: <b>Matrix cross-check</b> — ${gaps.length} ok cell(s) not exercised</summary>\n\n`;
              comment += `| Function | Column |\n|----------|--------|\n`;
              for (const g of gaps.sort((a, b) => a.fn.localeCompare(b.fn) || a.col.localeCompare(b.col))) {
                comment += `| ${g.fn} | ${g.col} |\n`;
              }
              comment += `\n</details>\n\n`;
            } else {
              const totalOk = Object.values(allOk).reduce((s, v) => s + v.size, 0);
              comment += `:white_check_mark: **Matrix cross-check**: all ${totalOk} ok cells exercised across ${exFiles.length} backend runs.\n\n`;
            }
          }

          const heading = allPassed && anyResults
            ? ":white_check_mark: All tests passed"
            : ":x: Some tests failed";
          comment = `## ${heading}\n\n${comment}`;

          fs.writeFileSync("comment-body.md", comment);
          // Also write to workflow summary page
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, comment);
          SCRIPT
          node summary.js

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Update existing bot comment or create a new one
          gh pr comment "$PR_NUMBER" --body-file comment-body.md --edit-last 2>/dev/null \
            || gh pr comment "$PR_NUMBER" --body-file comment-body.md
