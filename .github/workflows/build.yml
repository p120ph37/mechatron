name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  HOST_NODE_VERSION: "22"
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14
            arch: arm64
          - os: macos-14
            arch: x64
          - os: windows-2022
            arch: x64
          - os: windows-2022
            arch: ia32
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.HOST_NODE_VERSION }}

      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxinerama-dev libxtst-dev xvfb

      - if: runner.os == 'macOS' && matrix.arch == 'x64'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Grant macOS accessibility permissions
        if: runner.os == 'macOS'
        run: |
          echo "=== SIP Status ==="
          csrutil status || true
          # Detect TCC.db schema (column count varies by macOS version)
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          COLS=$(sudo sqlite3 "$TCC_DB" "PRAGMA table_info(access);" 2>/dev/null | wc -l || echo "0")
          echo "=== TCC access table columns: $COLS ==="
          NODE_BIN=$(which node)
          TS=$(date +%s)
          # Build VALUES clause based on column count
          if [ "$COLS" -ge 17 ]; then
            VALS="1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,${TS},NULL,NULL,'UNUSED',${TS}"
          else
            VALS="1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,${TS}"
          fi
          # Grant accessibility + post-event to node and bash in both DBs
          for DB in "$TCC_DB" "$HOME/Library/Application Support/com.apple.TCC/TCC.db"; do
            for CLIENT in "$NODE_BIN" "/bin/bash"; do
              for SVC in kTCCServiceAccessibility kTCCServicePostEvent kTCCServiceScreenCapture; do
                sudo sqlite3 "$DB" "INSERT OR REPLACE INTO access VALUES('$SVC','$CLIENT',$VALS);" 2>/dev/null || true
              done
            done
          done
          # Diagnostic: show what's granted
          sudo sqlite3 "$TCC_DB" "SELECT service,client FROM access WHERE service IN ('kTCCServiceAccessibility','kTCCServicePostEvent');" 2>/dev/null || echo "(TCC.db read blocked by SIP)"

      - name: Diagnose Windows desktop session
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "Session ID: $([System.Diagnostics.Process]::GetCurrentProcess().SessionId)"
          query session 2>$null || Write-Host "(query session not available)"
          query user 2>$null || Write-Host "(query user not available)"
          # Check if we have an interactive desktop
          Add-Type -TypeDefinition @"
          using System;
          using System.Runtime.InteropServices;
          public class Desktop {
              [DllImport("user32.dll")]
              public static extern IntPtr GetDesktopWindow();
              [DllImport("user32.dll")]
              public static extern IntPtr GetForegroundWindow();
          }
          "@
          $desktop = [Desktop]::GetDesktopWindow()
          $foreground = [Desktop]::GetForegroundWindow()
          Write-Host "Desktop window handle: $desktop"
          Write-Host "Foreground window handle: $foreground"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: npm ci --ignore-scripts

      - run: npm run build -- --target=$(node -v | sed 's/^v//') --arch ${{ matrix.arch }}

      - name: Bundle TypeScript
        run: bun build lib/index.ts --outdir dist --target node --format cjs --external node-gyp-build --external path

      - name: Run tests
        run: |
          TEST_LOG="${RUNNER_TEMP}/test-output.txt"
          run_and_log() { "$@" 2>&1 | tee "$TEST_LOG"; return "${PIPESTATUS[0]}"; }
          if [ "${{ matrix.arch }}" = "x64" ] && [ "${{ runner.arch }}" != "X64" ]; then
            # Cross-compiled x64 on arm64 macOS — download x64 node to test
            NODE_VERSION=$(node -v)
            curl -sL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-darwin-x64.tar.gz" | tar xz
            X64_NODE="./node-${NODE_VERSION}-darwin-x64/bin/node"
            # Launch via Terminal.app for TCC responsible process context
            TEST_FIFO=/tmp/mechatron-test-fifo
            TEST_EXIT=/tmp/mechatron-test-exit
            mkfifo "$TEST_FIFO"
            WORK_DIR="$(pwd)"
            X64_NODE_ABS="$(cd "$(dirname "$X64_NODE")" && pwd)/$(basename "$X64_NODE")"
            printf '#!/bin/bash\ncd "%s"\nsudo "%s" test/test-ci.js all > "%s" 2>&1\necho $? > "%s"\n' \
              "$WORK_DIR" "$X64_NODE_ABS" "$TEST_FIFO" "$TEST_EXIT" > /tmp/mechatron-test-runner.sh
            chmod +x /tmp/mechatron-test-runner.sh
            if open -a Terminal /tmp/mechatron-test-runner.sh 2>/dev/null; then
              cat "$TEST_FIFO" | tee "$TEST_LOG"
              sleep 1
              EXIT_CODE=$(cat "$TEST_EXIT" 2>/dev/null || echo "1")
            else
              echo "Terminal.app launch failed, falling back to direct execution"
              rm -f "$TEST_FIFO"
              run_and_log sudo "$X64_NODE_ABS" test/test-ci.js all
              EXIT_CODE=$?
            fi
            rm -f "$TEST_FIFO" "$TEST_EXIT" /tmp/mechatron-test-runner.sh
            exit $EXIT_CODE
          elif [ "${{ matrix.arch }}" = "ia32" ]; then
            NODE_VERSION=$(node -v)
            curl -sLO "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-win-x86.zip"
            unzip -q "node-${NODE_VERSION}-win-x86.zip"
            run_and_log ./node-${NODE_VERSION}-win-x86/node test/test-ci.js all
          elif [ "${{ runner.os }}" = "Linux" ]; then
            run_and_log xvfb-run --auto-servernum node test/test-ci.js all
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # Try launching via Terminal.app so it becomes the "responsible process"
            # for TCC — Terminal.app has kTCCServiceAccessibility pre-granted.
            TEST_FIFO=/tmp/mechatron-test-fifo
            TEST_EXIT=/tmp/mechatron-test-exit
            mkfifo "$TEST_FIFO"
            WORK_DIR="$(pwd)"
            NODE_BIN="$(which node)"
            printf '#!/bin/bash\ncd "%s"\nsudo "%s" test/test-ci.js all > "%s" 2>&1\necho $? > "%s"\n' \
              "$WORK_DIR" "$NODE_BIN" "$TEST_FIFO" "$TEST_EXIT" > /tmp/mechatron-test-runner.sh
            chmod +x /tmp/mechatron-test-runner.sh
            if open -a Terminal /tmp/mechatron-test-runner.sh 2>/dev/null; then
              # Stream output from FIFO (blocks until writer closes)
              cat "$TEST_FIFO" | tee "$TEST_LOG"
              sleep 1
              EXIT_CODE=$(cat "$TEST_EXIT" 2>/dev/null || echo "1")
            else
              echo "Terminal.app launch failed, falling back to direct execution"
              rm -f "$TEST_FIFO"
              run_and_log sudo "$NODE_BIN" test/test-ci.js all
              EXIT_CODE=$?
            fi
            rm -f "$TEST_FIFO" "$TEST_EXIT" /tmp/mechatron-test-runner.sh
            exit $EXIT_CODE
          else
            run_and_log node test/test-ci.js all
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-log-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/test-output.txt
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/
          if-no-files-found: error
